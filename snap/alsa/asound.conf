# Route ALSA through the host PulseAudio/PipeWire-pulse server.
# PortAudio (pyaudio) opens the ALSA host API first; without this it either
# segfaults (missing /usr/share/alsa/alsa.conf) or finds zero devices.
pcm.!default {
    type pulse
    fallback "sysdefault"
    hint {
        show on
        description "PulseAudio Sound Server"
    }
}

ctl.!default {
    type pulse
    fallback "sysdefault"
}
