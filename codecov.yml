coverage:
  # Badge colors: red below 50%, yellow 50–80%, green at 80%+ (matches project target)
  range: 50..80
  round: down
  precision: 2
  status:
    project:
      default:
        target: auto
        threshold: 0.5%
    patch:
      default:
        target: 80%

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false
